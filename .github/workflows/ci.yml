name: CI
on: [workflow_call]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck host
        run: pnpm --filter @earendil-works/gondolin exec tsc --noEmit

      - name: Build package artifacts
        run: pnpm --filter @earendil-works/gondolin run build

      - name: Verify packaged CLI runtime
        run: node host/dist/bin/gondolin.js --help >/dev/null

  build-guest:
    name: Build Guest (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            qemu: qemu-system-x86
            artifact: gondolin-guest-x64
            zig-target: x86_64-linux-musl
          - arch: aarch64
            qemu: qemu-system-arm
            artifact: gondolin-guest-arm64
            zig-target: aarch64-linux-musl
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Zig
        run: |
          curl -L https://ziglang.org/download/0.15.1/zig-x86_64-linux-0.15.1.tar.xz | tar -xJ
          echo "$PWD/zig-x86_64-linux-0.15.1" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.qemu }} lz4
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          pnpm install

      - name: Build guest binaries (cross-compile)
        run: |
          cd guest
          zig build -Doptimize=ReleaseSmall -Dtarget=${{ matrix.zig-target }}

      - name: Build guest image
        run: |
          NODE_BIN="$(node -p 'process.execPath')"
          cd guest
          ALPINE_ARCH=${{ matrix.arch }} make build NODE="$NODE_BIN"

      - name: Package assets
        run: |
          cd guest/image/out
          tar -czvf ../../../${{ matrix.artifact }}.tar.gz \
            manifest.json vmlinuz-virt initramfs.cpio.lz4 rootfs.ext4 \
            krun-kernel krun-empty-initrd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          retention-days: 7

  container-build:
    name: Container Build (smoke)
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Zig
        run: |
          curl -L https://ziglang.org/download/0.15.1/zig-x86_64-linux-0.15.1.tar.xz | tar -xJ
          echo "$PWD/zig-x86_64-linux-0.15.1" >> $GITHUB_PATH

      - name: Install dependencies
        run: pnpm install

      - name: Verify host CLI runtime
        run: node host/bin/gondolin.ts --help >/dev/null

      - name: Build guest binaries
        run: |
          cd guest
          zig build -Doptimize=ReleaseSmall

      - name: Verify Docker is available
        run: docker info

      - name: Smoke test container build (forces docker)
        timeout-minutes: 15
        run: |
          cat > build-config-container-smoke.json <<'JSON'
          {
            "arch": "x86_64",
            "distro": "alpine",
            "alpine": {
              "version": "3.23.0",
              "kernelPackage": "linux-virt",
              "kernelImage": "vmlinuz-virt",
              "rootfsPackages": ["linux-virt"],
              "initramfsPackages": []
            },
            "container": {
              "force": true,
              "image": "alpine:3.23",
              "runtime": "docker"
            },
            "sandboxdPath": "./guest/zig-out/bin/sandboxd",
            "sandboxfsPath": "./guest/zig-out/bin/sandboxfs",
            "sandboxsshPath": "./guest/zig-out/bin/sandboxssh"
          }
          JSON

          node host/bin/gondolin.ts build \
            --config build-config-container-smoke.json \
            --output ./tmp-container-assets \
            --quiet

          test -f ./tmp-container-assets/manifest.json
          test -s ./tmp-container-assets/vmlinuz-virt
          test -s ./tmp-container-assets/initramfs.cpio.lz4
          test -s ./tmp-container-assets/rootfs.ext4
          test -s ./tmp-container-assets/krun-kernel
          test -f ./tmp-container-assets/krun-empty-initrd

  krun-linux-build:
    name: Build krun runner (Linux x86_64 smoke)
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Zig
        run: |
          curl -L https://ziglang.org/download/0.15.1/zig-x86_64-linux-0.15.1.tar.xz | tar -xJ
          echo "$PWD/zig-x86_64-linux-0.15.1" >> $GITHUB_PATH

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl git make pkg-config clang lld xz-utils \
            libclang-dev llvm-dev libcap-ng-dev

      - name: Build krun runner
        run: make krun-runner

      - name: Verify krun runner binary
        run: host/krun-runner/zig-out/bin/gondolin-krun-runner --version

  krun-runner-package-smoke:
    name: Package krun runner (Linux x86_64 smoke)
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Zig
        run: |
          curl -L https://ziglang.org/download/0.15.1/zig-x86_64-linux-0.15.1.tar.xz | tar -xJ
          echo "$PWD/zig-x86_64-linux-0.15.1" >> $GITHUB_PATH

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl git make pkg-config clang lld xz-utils \
            libclang-dev llvm-dev libcap-ng-dev

      - name: Build krun runner
        run: make krun-runner

      - name: Prepare linux runner package payload
        run: |
          node scripts/prepare-krun-runner-package.mjs \
            --package packages/gondolin-krun-runner-linux-x64

      - name: Smoke test packed linux runner package
        run: |
          PKG_DIR="packages/gondolin-krun-runner-linux-x64"
          PKG_TGZ=$(cd "$PKG_DIR" && npm pack --silent)
          PKG_PATH="$PWD/$PKG_DIR/$PKG_TGZ"

          TMP_DIR=$(mktemp -d)
          cd "$TMP_DIR"
          npm init -y >/dev/null
          npm install "$PKG_PATH" >/dev/null
          ./node_modules/.bin/gondolin-krun-runner --version

  backend-parity:
    name: Backend parity (qemu + krun)
    needs: [check, build-guest, krun-linux-build, krun-runner-package-smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Download guest assets
        uses: actions/download-artifact@v8
        with:
          name: gondolin-guest-x64
          path: .

      - name: Extract guest assets
        run: |
          mkdir -p guest/image/out
          tar -xzvf gondolin-guest-x64.tar.gz -C guest/image/out
          touch guest/image/out/*

      - name: Install Zig
        run: |
          curl -L https://ziglang.org/download/0.15.1/zig-x86_64-linux-0.15.1.tar.xz | tar -xJ
          echo "$PWD/zig-x86_64-linux-0.15.1" >> $GITHUB_PATH

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 lz4 \
            build-essential curl git make pkg-config clang lld xz-utils \
            libclang-dev llvm-dev libcap-ng-dev

      - name: Enable KVM
        run: sudo chown $(id -u) /dev/kvm

      - name: Install dependencies
        run: pnpm install

      - name: Build krun runner
        run: make krun-runner

      - name: Probe krun runtime availability
        run: |
          cd host
          node --input-type=module -e "import { getKrunRuntimeSkipReason } from './test/helpers/vm-fixture.ts'; const reason = await getKrunRuntimeSkipReason(); if (reason) { console.log('krun precheck: unavailable ->', reason); } else { console.log('krun precheck: available'); }"
        env:
          GONDOLIN_GUEST_DIR: ${{ github.workspace }}/guest/image/out

      - name: Run backend parity tests
        timeout-minutes: 15
        run: |
          cd host
          pnpm run test:backend-parity
        env:
          GONDOLIN_GUEST_DIR: ${{ github.workspace }}/guest/image/out
          WS_TIMEOUT: "120000"
          # krun runtime is best-effort on shared CI runners; tests self-skip when precheck fails
          GONDOLIN_REQUIRE_KRUN: "0"

  test:
    name: Test
    needs: [check, build-guest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Download guest assets
        uses: actions/download-artifact@v8
        with:
          name: gondolin-guest-x64
          path: .

      - name: Extract guest assets
        run: |
          mkdir -p guest/image/out
          tar -xzvf gondolin-guest-x64.tar.gz -C guest/image/out
          # Touch extracted files so Make considers them newer than source deps
          # (prevents rebuilding images that were already built in build-guest job)
          touch guest/image/out/*

      - name: Install Zig
        run: |
          curl -L https://ziglang.org/download/0.15.1/zig-x86_64-linux-0.15.1.tar.xz | tar -xJ
          echo "$PWD/zig-x86_64-linux-0.15.1" >> $GITHUB_PATH

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 lz4
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Enable KVM
        run: sudo chown $(id -u) /dev/kvm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Run tests
        # Run guest + host tests sequentially to avoid running multiple QEMU instances
        # concurrently (which can hang/time out on some CI runners).
        timeout-minutes: 20
        run: |
          NODE_BIN="$(node -p 'process.execPath')"
          make -C guest test NODE="$NODE_BIN"
          pnpm --dir host test
        env:
          GONDOLIN_GUEST_DIR: ${{ github.workspace }}/guest/image/out
          WS_TIMEOUT: "120000"
          # Enable VM/QEMU logs to help diagnose boot/hang issues in CI.
          GONDOLIN_DEBUG: "net"

  windows-host:
    name: Windows host (QEMU)
    needs: [check, build-guest]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install QEMU (Windows)
        shell: pwsh
        run: |
          $url = 'https://qemu.weilnetz.de/w64/2026/qemu-w64-setup-20260415.exe'
          $expected = '736e125e044149611c47510d5696bc877b8df741655f229a3e9348f31bd49bf2b0105c78717888f5259aac3708e51fdc9d2c45d919becec5ec9398a08c8d435a'
          $installer = Join-Path $env:RUNNER_TEMP 'qemu-w64-setup-20260415.exe'
          $installDir = Join-Path $env:ProgramFiles 'qemu'
          $sevenZip = Get-Command 7z.exe -ErrorAction SilentlyContinue
          if (-not $sevenZip) {
            $sevenZip = Get-Command 7z -ErrorAction SilentlyContinue
          }
          if (-not $sevenZip) {
            throw '7z is required to extract the QEMU installer on windows-latest'
          }

          Invoke-WebRequest -Uri $url -OutFile $installer
          $actual = (Get-FileHash $installer -Algorithm SHA512).Hash.ToLowerInvariant()
          if ($actual -ne $expected) {
            throw "QEMU installer SHA512 mismatch: expected $expected got $actual"
          }

          if (Test-Path $installDir) {
            Remove-Item -Recurse -Force $installDir
          }
          New-Item -ItemType Directory -Force $installDir | Out-Null
          & $sevenZip.Source x '-y' "-o$installDir" $installer | Out-Host
          if ($LASTEXITCODE -ne 0) {
            throw 'Failed to extract the QEMU installer with 7z'
          }

          $qemuExe = Join-Path $installDir 'qemu-system-x86_64.exe'
          $qemuGuiExe = Join-Path $installDir 'qemu-system-x86_64w.exe'
          if (-not (Test-Path $qemuExe) -and -not (Test-Path $qemuGuiExe)) {
            throw 'Extracted QEMU payload did not contain qemu-system-x86_64(.exe/.w.exe)'
          }

          Write-Host "Extracted QEMU into $installDir"

      - name: Resolve QEMU path and accelerators
        shell: pwsh
        run: |
          $candidates = @(
            (Join-Path $env:ProgramFiles 'qemu\qemu-system-x86_64.exe'),
            (Join-Path $env:ProgramFiles 'qemu\qemu-system-x86_64w.exe')
          )
          $qemu = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $qemu) {
            throw 'Failed to resolve qemu-system-x86_64(.exe/.w.exe) after extraction'
          }

          "WINDOWS_QEMU=$qemu" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & $qemu -accel help

      - name: Download guest assets
        uses: actions/download-artifact@v8
        with:
          name: gondolin-guest-x64
          path: .

      - name: Extract guest assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force guest/image/out | Out-Null
          tar -xzf gondolin-guest-x64.tar.gz -C guest/image/out

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Run host tests
        timeout-minutes: 25
        run: pnpm --dir host test
        env:
          GONDOLIN_GUEST_DIR: ${{ github.workspace }}\guest\image\out
          WS_TIMEOUT: "120000"
          GONDOLIN_DEBUG: "net"

      - name: CLI smoke test (Windows QEMU)
        timeout-minutes: 10
        shell: pwsh
        env:
          GONDOLIN_GUEST_DIR: ${{ github.workspace }}\guest\image\out
        run: |
          $accelHelp = (& $env:WINDOWS_QEMU -accel help 2>&1 | Out-String)
          $hasWhpx = $accelHelp -match '(^|\r?\n)\s*whpx\s*(\r?\n|$)'

          $args = @('host/dist/bin/gondolin.js', 'exec', '--', '/bin/sh', '-lc', 'echo WINDOWS_CLI_SMOKE_OK')
          $output = & node @args 2>&1
          $text = ($output | ForEach-Object { $_.ToString() }) -join "`n"
          Write-Host $text

          if ($LASTEXITCODE -ne 0) {
            throw 'Windows CLI smoke test failed'
          }
          if ($text -notmatch 'WINDOWS_CLI_SMOKE_OK') {
            throw 'Windows CLI smoke test did not produce the success marker'
          }

          if ($hasWhpx) {
            if ($text -match 'using QEMU TCG software emulation') {
              throw 'Unexpected TCG warning while WHPX is available'
            }
          } else {
            if ($text -notmatch 'using QEMU TCG software emulation') {
              throw 'Expected the Windows CLI to warn when falling back to TCG'
            }
          }

